<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rena's Love Wonderland</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff8fcf,#caa8ff);
color:white;
text-align:center;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

h1{
margin-top:20px;
font-size:40px;
text-shadow:0 0 15px pink;
}

#bunny{
font-size:90px;
animation:float 3s infinite ease-in-out;
cursor:pointer;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.boxes{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.box{
width:130px;
height:130px;
background:white;
color:black;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
box-shadow:0 0 25px white;
transition:0.3s;
}

.box span{
font-size:14px;
margin-top:5px;
}

.box:hover{
transform:scale(1.15);
}

#messageBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:25px;
border-radius:15px;
width:330px;
display:none;
box-shadow:0 0 25px pink;
font-size:18px;
min-height:80px;
}

#close{
margin-top:15px;
padding:8px 15px;
border:none;
background:#ff4da6;
color:white;
border-radius:10px;
cursor:pointer;
}

.heart{
position:absolute;
font-size:24px;
animation:rise 4s linear forwards;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-700px);opacity:0}
}

.rose{
position:absolute;
font-size:26px;
animation:fall 5s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(700px)}
}

#proposal{
display:none;
margin-top:40px;
}

button{
padding:12px 22px;
font-size:18px;
border:none;
border-radius:25px;
margin:10px;
cursor:pointer;
}

#yes{background:#ff4da6;color:white;}
#no{background:black;color:white;position:relative;}

.fire{
position:absolute;
font-size:30px;
animation:boom 2s forwards;
}

@keyframes boom{
0%{transform:scale(0)}
100%{transform:scale(2);opacity:0}
}

</style>

</head>

<body>

<h1>Welcome to Rax's Love World</h1>

<div id="bunny" onclick="bunnyTalk()">🐰</div>

<p id="bunnyText">Click the bunny to hear its secret...</p>

<div class="boxes">
<div class="box" onclick="letters()">💌<span>Letters</span></div>
<div class="box" onclick="kisses()">💋<span>Kisses</span></div>
<div class="box" onclick="cake()">🍫<span>Chocolate</span></div>
<div class="box" onclick="heart()">❤️<span>Heart</span></div>
</div>

<div id="proposal">
<h2>Will you stay in my universe forever? 💍</h2>
<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no">NO 💔</button>
</div>

<div id="messageBox">
<div id="text"></div>
<button id="close" onclick="closeMsg()">Close</button>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"
document.body.appendChild(star)
}

/* music */

const music=document.getElementById("music")
document.body.addEventListener("click",()=>{music.play()},{once:true})

/* bunny talk */

function bunnyTalk(){
document.getElementById("bunnyText").innerText="Rax asked me to protect his love for you, Rena 💖"
}

/* typewriter */

function typeWriter(text){

let i=0
let box=document.getElementById("text")
box.innerHTML=""
document.getElementById("messageBox").style.display="block"

let interval=setInterval(()=>{
box.innerHTML+=text[i]
i++
if(i>=text.length)clearInterval(interval)
},35)

}

function closeMsg(){
document.getElementById("messageBox").style.display="none"
}

/* letters */

const quotes=[
"You are the calm in my chaos.",
"Loving you is my favorite destiny.",
"Your smile fixes my worst days.",
"My heart feels home when I am with you.",
"In every universe I would still choose you.",
"Your eyes are the universe where I get lost."
]

let q=0

function letters(){

typeWriter(quotes[q])

q++
if(q>=quotes.length)q=0

}

/* kisses */

function kisses(){

for(let i=0;i<40;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💋"

heart.style.left=Math.random()*100+"%"
heart.style.bottom="0px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)
}

typeWriter("Every kiss flying here is one I wish I could give you right now 💋")

}

/* chocolate */

function cake(){

for(let i=0;i<35;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="🍫"

heart.style.left=Math.random()*100+"%"
heart.style.bottom="0px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)
}

typeWriter("Chocolate and cheesecake remind me of you… sweet and irresistible 🍰")

}

/* roses */

function roses(){

for(let i=0;i<20;i++){

let r=document.createElement("div")
r.className="rose"
r.innerHTML="🌹"

r.style.left=Math.random()*100+"%"
r.style.top="-20px"

document.body.appendChild(r)

setTimeout(()=>r.remove(),5000)

}

}

/* heart vault */

function heart(){

roses()

typeWriter("Rena… In every universe, every timeline, every life… I would still find you and fall in love with you again ❤️")

document.getElementById("proposal").style.display="block"

}

/* yes fireworks */

function yes(){

for(let i=0;i<40;i++){

let f=document.createElement("div")
f.className="fire"
f.innerHTML="🎆"

f.style.left=Math.random()*100+"%"
f.style.top=Math.random()*100+"%"

document.body.appendChild(f)

setTimeout(()=>f.remove(),2000)
}

document.body.innerHTML="<h1>❤️ You just made the happiest man alive ❤️</h1><h2>I love you forever Rena</h2>"

}

/* running no */

const no=document.getElementById("no")

no.addEventListener("mouseover",()=>{

no.style.position="absolute"
no.style.left=Math.random()*window.innerWidth+"px"
no.style.top=Math.random()*window.innerHeight+"px"

})

</script>

</body>
</html>
