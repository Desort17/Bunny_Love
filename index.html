```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rena's Love Wonderland</title>

<style>

body{
margin:0;
overflow:hidden;
font-family: "Segoe UI", sans-serif;
background:linear-gradient(135deg,#ffb6d9,#d6b3ff);
height:100vh;
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:42px;
text-shadow:0 0 10px pink;
}

#bunny{
font-size:80px;
margin-top:10px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.boxes{
margin-top:40px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.box{
width:120px;
height:120px;
background:white;
color:black;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:40px;
box-shadow:0 0 20px rgba(255,255,255,0.7);
transition:0.3s;
}

.box:hover{
transform:scale(1.1);
}

#letters{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.letter{
position:absolute;
background:white;
color:black;
padding:10px;
border-radius:10px;
animation:fall 8s linear;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(100vh)}
}

#message{
margin-top:40px;
font-size:24px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

#proposal{
display:none;
margin-top:50px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4da6;
color:white;
}

#no{
background:black;
color:white;
position:relative;
}

.heart{
position:absolute;
color:pink;
animation:rise 4s linear infinite;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-600px);opacity:0}
}

</style>
</head>

<body>

<h1>Welcome to Rax's Love World</h1>

<div id="bunny">🐰</div>

<div id="message">
Hello Rena 💖  
This little bunny was protecting my love for you.  
Today it will show you what lives inside my heart.
</div>

<div class="boxes">

<div class="box" onclick="letters()">💌</div>
<div class="box" onclick="kisses()">😘</div>
<div class="box" onclick="cake()">🍰</div>
<div class="box" onclick="heartVault()">❤️</div>

</div>

<div id="letters"></div>

<div id="proposal">
<h2>Will you stay in my universe forever? 💍</h2>
<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no">NO 💔</button>
</div>

<script>

const quotes=[
"You are the calm in my chaos.",
"Loving you is my favorite destiny.",
"Your smile fixes my worst days.",
"My heart feels home when I am with you.",
"You are my favorite chapter in life.",
"In every universe I would still choose you.",
"Your eyes are the universe where I get lost.",
"You are the magic in my ordinary life.",
"Forever is beautiful if it's with you.",
"My heart beats your name."
];

function letters(){

for(let i=0;i<15;i++){

let letter=document.createElement("div");
letter.className="letter";
letter.style.left=Math.random()*100+"%";
letter.style.animationDuration=(5+Math.random()*5)+"s";
letter.innerText=quotes[Math.floor(Math.random()*quotes.length)];

document.getElementById("letters").appendChild(letter);

setTimeout(()=>letter.remove(),8000);

}

}

function kisses(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💋";
heart.style.left=Math.random()*100+"%";
heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

}

document.getElementById("message").innerText=
"Every kiss flying here is one I wish I could give you right now.";

}

function cake(){

document.getElementById("message").innerText=
"Sweet chocolate and cheesecake remind me of you. But even they are jealous of your sweetness.";

for(let i=0;i<20;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="🍫";
heart.style.left=Math.random()*100+"%";
heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

}

}

function heartVault(){

document.getElementById("message").innerHTML=
"Rena... <br><br> In every universe, every timeline, every life... <br> I would still find you. <br> And I would still fall in love with you.";

document.getElementById("proposal").style.display="block";

}

function yes(){

document.body.innerHTML=
"<h1>❤️ You just made the happiest man alive ❤️</h1><h2>I love you forever Rena</h2>";

}

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.position="absolute";
no.style.left=Math.random()*window.innerWidth+"px";
no.style.top=Math.random()*window.innerHeight+"px";

});

</script>

</body>
</html>
```
