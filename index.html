<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rena's Love Wonderland</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#caa8ff);
overflow:hidden;
text-align:center;
color:white;
}

h1{
margin-top:20px;
font-size:40px;
text-shadow:0 0 15px pink;
}

#bunny{
font-size:80px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.boxes{
display:flex;
justify-content:center;
gap:25px;
margin-top:40px;
flex-wrap:wrap;
}

.box{
width:120px;
height:120px;
background:white;
color:black;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px white;
}

.box:hover{
transform:scale(1.15);
}

#messageBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:25px;
border-radius:15px;
width:320px;
display:none;
box-shadow:0 0 20px pink;
font-size:18px;
}

#close{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff4da6;
color:white;
border-radius:10px;
cursor:pointer;
}

.heart{
position:absolute;
font-size:25px;
animation:rise 4s linear forwards;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-600px);opacity:0}
}

#proposal{
display:none;
margin-top:40px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:25px;
margin:10px;
cursor:pointer;
}

#yes{background:#ff4da6;color:white;}
#no{background:black;color:white;position:relative;}
</style>

</head>

<body>

<h1>Welcome to Rax's Love World</h1>

<div id="bunny">🐰</div>

<p>This bunny has been guarding my love for you Rena 💖</p>

<div class="boxes">
<div class="box" onclick="letters()">💌</div>
<div class="box" onclick="kisses()">💋</div>
<div class="box" onclick="cake()">🍰</div>
<div class="box" onclick="heart()">❤️</div>
</div>

<div id="proposal">
<h2>Will you stay in my universe forever? 💍</h2>
<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no">NO 💔</button>
</div>

<div id="messageBox">
<div id="text"></div>
<button id="close" onclick="closeMsg()">Close</button>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const music = document.getElementById("music");

document.body.addEventListener("click",function(){
music.play();
},{once:true});

const quotes=[
"You are the calm in my chaos.",
"Loving you is my favorite destiny.",
"Your smile fixes my worst days.",
"My heart feels home when I am with you.",
"You are my favorite chapter in life.",
"In every universe I would still choose you.",
"Your eyes are the universe where I get lost.",
"You are the magic in my ordinary life.",
"Forever is beautiful if it's with you.",
"My heart beats your name."
];

let q=0;

function showMessage(msg){
document.getElementById("text").innerHTML=msg;
document.getElementById("messageBox").style.display="block";
}

function closeMsg(){
document.getElementById("messageBox").style.display="none";
}

function letters(){
showMessage(quotes[q]);
q++;
if(q>=quotes.length){q=0;}
}

function kisses(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💋";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);
}

showMessage("Every kiss floating here is one I wish I could give you right now 💋");
}

function cake(){

for(let i=0;i<25;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="🍫";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="0px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);
}

showMessage("Chocolate and cheesecake remind me of you... sweet, beautiful, and impossible to resist 🍰");
}

function heart(){

showMessage("Rena... In every universe, every timeline, every life... I would still find you and fall in love with you again ❤️");

document.getElementById("proposal").style.display="block";
}

function yes(){

document.body.innerHTML="<h1>❤️ You just made the happiest man alive ❤️</h1><h2>I love you forever Rena</h2>";
}

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.position="absolute";
no.style.left=Math.random()*window.innerWidth+"px";
no.style.top=Math.random()*window.innerHeight+"px";

});

</script>

</body>
</html>
